<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1">
  <meta name="description"
        content="Flow Car Studio">
  <meta name="author"
        content="João Fraga">
  <title>Flow Car Studio</title>

  <link rel="canonical"
        href="https://flowcar.pt/">

  <!-- Bootstrap core CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">

  <!-- Bootstrap icons CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">

  <!-- Custom styles -->
  <link href="assets/css/style.css"
        rel="stylesheet">
</head>

<body>

  <main>

    <!-- Cover -->
    <div class="position-relative overflow-hidden pt-5 px-3 px-md-3 mx-md-3 text-center text-white">
      <div class="col-md-12 px-lg-5 mx-auto py-4">
        <img class="logo"
             src="assets/images/logo.png"
             alt="logo">
        <p class="lead fw-normal">Car Studio.</p>
        <p class="lead fw-normal pb-3">Confie o seu sonho com a Flow Car Studio.</p>
      </div>
    </div>

    <!-- First row Content -->
    <div class="bg-dark d-md-flex flex-md-equal w-100 ps-md-4 pt-4">
      <div class="pe-md-4 pb-4 text-center overflow-hidden">
        <img class="bg-light shadow-sm mx-auto"
             src="assets/images/studio.jpg"
             alt="studio picture"></img>
      </div>
      <div class="pe-md-4 pb-4 text-center overflow-hidden">
        <img class="bg-light shadow-sm mx-auto"
             src="assets/images/vinyl.jpg"
             alt="stylish vinyl picture"></img>
      </div>
    </div>

    <!-- Second row Content -->
    <div class="bg-dark d-md-flex flex-md-equal w-100 ps-md-4">
      <div class="pe-md-4 pb-4 text-center overflow-hidden">
        <img class="bg-light shadow-sm mx-auto"
             src="assets/images/car.jpg"
             alt="car picture"></img>
      </div>
      <div class="pe-md-4 pb-4 text-center overflow-hidden">
        <iframe title="map"
                class="bg-light shadow-sm mx-auto"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3000.686507977048!2d-8.58637408451981!3d41.22860167927913!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd2466c575f0afa3%3A0x745082479e5a1d81!2sR.%20Rio%20207!5e0!3m2!1sen!2spt!4v1661348055355!5m2!1sen!2spt"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </main>

  <footer class="p-5 bg-light">
    <div class="row ps-5">
      <div class="col-12 col-md">
        <small class="d-block mb-3 text-muted">Flow Car Studio &copy; 2022</small>
      </div>
    </div>
    <div class="row ps-5">
      <div class="col-6 col-md">
        <h5>Contactos</h5>
        <ul class="list-unstyled text-small">
          <li><i class="bi bi-envelope"></i> <a class="link-secondary"
               href="mailto:geral@flowcar.pt">geral@flowcar.pt</a></li>
          <li><i class="bi bi-phone"></i> <a class="link-secondary"
               href="tel:939699442">939699442</a></li>
          <li><i class="bi bi-phone"></i> <a class="link-secondary"
               href="tel:939699447">939699447</a></li>
        </ul>
      </div>
      <div class="col-6 col-md">
        <h5>Sobre nós</h5>
        <ul class="list-unstyled text-small">
          <li><i class="bi bi-people"></i> <a id="team"
               class="link-secondary"
               href="#team">Equipa</a></li>
          <li><i class="bi bi-geo-alt"></i> <a id="locations"
               class="link-secondary"
               href="#locations">Localizações</a></li>
          <li><i class="bi bi-shield-check"></i> <a id="privacy"
               class="link-secondary"
               href="#privacy">Privacidade</a></li>
          <li><i class="bi bi-card-text"></i> <a id="terms"
               class="link-secondary"
               href="#terms">Termos e Condições</a></li>
        </ul>
      </div>
    </div>
    <div class="row  ps-5">
      <div class="col-6 col-md">
        <h5>Links</h5>
        <ul class="list-unstyled text-small text-muted">
          <li><i class="bi bi-facebook"></i> <a class="link-secondary"
               href="https://www.facebook.com/flowcarstudio/">Facebook</a></li>
          <li><i class="bi bi-instagram"></i> <a class="link-secondary"
               href="https://www.instagram.com/flowcarstudio/">Instagram</a></li>
          <li><i class="bi bi-twitter"></i> <a class="link-secondary"
               href="https://www.twitter.com/flowcarstudio/">Twitter</a></li>
        </ul>
      </div>
    </div>
  </footer>

  <script src="/assets/bootstrap/bootstrap.bundle.min.js"></script>

</body>

</html>
